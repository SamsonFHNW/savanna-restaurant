services:
  - type: web
    name: savanna-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      # ─── Recipients ───
      - key: OWNER_EMAIL
        sync: false
      # ─── Email: Resend (preferred) OR SMTP ───
      - key: RESEND_API_KEY
        sync: false
      - key: EMAIL_FROM
        value: "Savanna <reservations@savanna-restaurant.ch>"
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      # ─── CORS ───
      - key: ALLOWED_ORIGINS
        value: "https://savanna-restaurant.ch,https://www.savanna-restaurant.ch"
