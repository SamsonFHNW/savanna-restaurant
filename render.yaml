# Render blueprint — Savanna backend (FastAPI, email-only reservations).
# Commands run from the `backend/` directory (rootDir), where requirements.txt
# and the `app/` package live.
services:
  - type: web
    name: savanna-api
    runtime: python
    region: frankfurt
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # The ASGI app lives at backend/app/main.py -> module path app.main:app
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      # Values are set in the Render dashboard (sync: false = not stored in the repo).
      - key: OWNER_EMAIL
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ENVIRONMENT
        value: production
