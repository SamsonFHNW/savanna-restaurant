# Netlify configuration — Savanna frontend (static, path-based i18n)
#
# Structure: /index.html redirects to the visitor's language (/fr/ /en/ /de/ /it/).
# Each language folder holds that language's pages with localized slugs, e.g.
#   /fr/reserver  /en/reserve  /de/reservieren  /it/prenotare
# Netlify's default "Pretty URLs" serves fr/menu.html at /fr/menu and redirects
# the .html form to the clean URL, so the localized links resolve cleanly.

[build]
  publish = "."

# Redirect www → apex (also configure at the registrar/DNS level)
[[redirects]]
  from = "https://www.savanna-restaurant.ch/*"
  to = "https://savanna-restaurant.ch/:splat"
  status = 301
  force = true

# The src/ templates and the build script are not part of the served site.
[[redirects]]
  from = "/src/*"
  to = "/fr/"
  status = 404
[[redirects]]
  from = "/build_i18n.py"
  to = "/fr/"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Translations change rarely; let clients cache them briefly.
[[headers]]
  for = "/i18n/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
