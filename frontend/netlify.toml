# Netlify configuration — Savanna frontend (static, path-based i18n)
#
# Structure: /index.html redirects to the visitor's language (/fr/ /en/ /de/ /it/).
# Each language folder holds that language's pages with localized slugs, e.g.
#   /fr/reserver  /en/reserve  /de/reservieren  /it/prenotare
# Netlify's default "Pretty URLs" serves fr/menu.html at /fr/menu and redirects
# the .html form to the clean URL, so the localized links resolve cleanly.

[build]
  publish = "."

# Redirect www → apex (also configure at the registrar/DNS level)
[[redirects]]
  from = "https://www.savanna-restaurant.ch/*"
  to = "https://savanna-restaurant.ch/:splat"
  status = 301
  force = true

# The src/ templates and the build script are not part of the served site.
[[redirects]]
  from = "/src/*"
  to = "/fr/"
  status = 404
[[redirects]]
  from = "/build_i18n.py"
  to = "/fr/"
  status = 404

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"
    Permissions-Policy = "geolocation=(), microphone=(), camera=(), payment=(), usb=()"
    # CSP allows: Google Fonts (css + font files), the Google Maps embed iframe,
    # inline style attributes in the markup, the hero video, and the reservation/
    # contact API. NOTE: update connect-src if the backend is not on *.onrender.com.
    Content-Security-Policy = "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'self'; form-action 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data:; media-src 'self'; frame-src https://www.google.com https://maps.google.com; connect-src 'self' https://*.onrender.com; upgrade-insecure-requests"

# Translations change rarely; let clients cache them briefly.
[[headers]]
  for = "/i18n/*"
  [headers.values]
    Cache-Control = "public, max-age=3600"
